<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CFSuite Migration</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 40px 20px; }
    .container { max-width: 800px; width: 100%; }
    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; color: #f8fafc; }
    .subtitle { color: #94a3b8; font-size: 0.9rem; margin-bottom: 32px; }
    .card { background: #1e293b; border-radius: 12px; padding: 28px; margin-bottom: 20px; border: 1px solid #334155; }
    .step-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; margin-bottom: 8px; }
    .field-label { font-size: 0.95rem; font-weight: 600; color: #f1f5f9; margin-bottom: 10px; }

    /* Custom picklist dropdown */
    .picklist { position: relative; }
    .picklist-trigger { width: 100%; padding: 10px 14px; background: #0f172a; border: 1px solid #475569; border-radius: 8px; color: #e2e8f0; font-size: 0.95rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: border-color 0.15s; }
    .picklist-trigger:hover { border-color: #64748b; }
    .picklist-trigger.open { border-color: #3b82f6; border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
    .picklist-trigger .placeholder { color: #64748b; }
    .picklist-trigger .arrow { color: #94a3b8; font-size: 0.7rem; transition: transform 0.15s; }
    .picklist-trigger.open .arrow { transform: rotate(180deg); }
    .picklist-dropdown { display: none; position: absolute; top: 100%; left: 0; right: 0; background: #0f172a; border: 1px solid #3b82f6; border-top: none; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; max-height: 280px; overflow-y: auto; z-index: 100; }
    .picklist-dropdown.open { display: block; }
    .picklist-search { width: 100%; padding: 8px 14px; background: #1e293b; border: none; border-bottom: 1px solid #334155; color: #e2e8f0; font-size: 0.85rem; outline: none; }
    .picklist-search::placeholder { color: #64748b; }
    .picklist-item { padding: 10px 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: background 0.1s; }
    .picklist-item:hover { background: #1e293b; }
    .picklist-item.selected { background: #1e3a5f; }
    .picklist-item.disabled { opacity: 0.4; cursor: not-allowed; }
    .picklist-item .org-info { flex: 1; min-width: 0; }
    .picklist-item .org-alias { font-weight: 500; font-size: 0.9rem; }
    .picklist-item .org-username { font-size: 0.75rem; color: #94a3b8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .picklist-item .org-badge { font-size: 0.65rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.03em; flex-shrink: 0; }
    .badge-sandbox { background: #064e3b; color: #34d399; }
    .badge-prod { background: #450a0a; color: #f87171; }
    .picklist-empty { padding: 12px 14px; color: #64748b; font-size: 0.85rem; text-align: center; }

    /* Selected org display in trigger */
    .trigger-selected { display: flex; align-items: center; gap: 8px; }
    .trigger-selected .org-badge { font-size: 0.6rem; font-weight: 700; padding: 1px 6px; border-radius: 8px; text-transform: uppercase; }

    /* Step 1: Side-by-side org layout */
    .step-orgs { display: flex; align-items: center; gap: 16px; }
    .org-col { flex: 1; min-width: 0; }
    .org-arrow { display: flex; align-items: center; justify-content: center; color: #64748b; font-size: 2rem; flex-shrink: 0; user-select: none; }

    @media (max-width: 640px) {
      .step-orgs { flex-direction: column; gap: 12px; }
      .org-arrow { padding-top: 0; font-size: 1.5rem; transform: rotate(90deg); align-self: center; }
    }

    .objects-grid { display: grid; gap: 8px; }
    .obj-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #0f172a; border: 1px solid #475569; border-radius: 8px; cursor: pointer; transition: border-color 0.15s; }
    .obj-item:hover { border-color: #64748b; }
    .obj-item.selected { border-color: #3b82f6; background: #1e3a5f; }
    .obj-item input { accent-color: #3b82f6; width: 16px; height: 16px; cursor: pointer; }
    .obj-item label { cursor: pointer; font-size: 0.9rem; }
    .select-all { font-size: 0.8rem; color: #3b82f6; cursor: pointer; margin-bottom: 10px; display: inline-block; }
    .select-all:hover { text-decoration: underline; }
    .btn { width: 100%; padding: 14px; background: #3b82f6; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .btn:hover:not(:disabled) { background: #2563eb; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn.running { background: #475569; }
    .review { background: #0f172a; border-radius: 8px; padding: 14px 16px; margin-bottom: 16px; font-size: 0.9rem; line-height: 1.6; }
    .review .label { color: #94a3b8; }
    .review .value { color: #f1f5f9; font-weight: 500; }
    .warning { background: #451a03; border: 1px solid #92400e; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 0.85rem; color: #fbbf24; }
    .results { margin-top: 16px; }
    .result-item { display: flex; justify-content: space-between; padding: 12px 16px; background: #0f172a; border-radius: 8px; margin-bottom: 6px; font-size: 0.9rem; }
    .result-item .name { font-weight: 500; }
    .result-item .stats { color: #94a3b8; }
    .result-item .stats span { margin-left: 12px; }
    .result-item .stats .inserted { color: #34d399; }
    .result-item .stats .skipped { color: #fbbf24; }
    .success-banner { background: #064e3b; border: 1px solid #059669; border-radius: 8px; padding: 14px 16px; margin-bottom: 16px; color: #34d399; font-weight: 600; text-align: center; }
    .error-banner { background: #450a0a; border: 1px solid #dc2626; border-radius: 8px; padding: 14px 16px; margin-bottom: 16px; color: #fca5a5; text-align: center; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #475569; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }

    /* Live progress status area */
    .progress-status { margin-top: 16px; margin-bottom: 16px; }
    .progress-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; font-size: 0.9rem; border-bottom: 1px solid #1e293b; }
    .progress-item:last-child { border-bottom: none; }
    .progress-icon { width: 20px; text-align: center; flex-shrink: 0; }
    .progress-icon.pending { color: #64748b; }
    .progress-icon.running { color: #3b82f6; }
    .progress-icon.done { color: #34d399; }
    .progress-name { font-weight: 500; color: #f1f5f9; }
    .progress-detail { color: #94a3b8; font-size: 0.8rem; margin-left: 4px; }

    /* Scrollbar styling for dropdowns */
    .picklist-dropdown::-webkit-scrollbar { width: 6px; }
    .picklist-dropdown::-webkit-scrollbar-track { background: transparent; }
    .picklist-dropdown::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>CFSuite Migration</h1>
    <p class="subtitle">Migrate configuration objects between Salesforce orgs</p>

    <!-- Step 1: Select Orgs (side by side) -->
    <div class="card" id="step-orgs">
      <div class="step-label">Step 1</div>
      <div class="field-label">Select Orgs</div>
      <div class="step-orgs">
        <!-- Source org -->
        <div class="org-col">
          <div class="field-label" style="font-size:0.85rem;color:#94a3b8;margin-bottom:8px;">Source (migrate from)</div>
          <div class="picklist" id="source-picklist">
            <div class="picklist-trigger" id="source-trigger">
              <span class="placeholder">Select source org...</span>
              <span class="arrow">&#9660;</span>
            </div>
            <div class="picklist-dropdown" id="source-dropdown">
              <input type="text" class="picklist-search" placeholder="Search orgs..." id="source-search">
              <div id="source-options"></div>
            </div>
          </div>
        </div>

        <!-- Arrow -->
        <div class="org-arrow">&#8594;</div>

        <!-- Target org -->
        <div class="org-col">
          <div class="field-label" style="font-size:0.85rem;color:#94a3b8;margin-bottom:8px;">Target (migrate to)</div>
          <div class="picklist" id="target-picklist">
            <div class="picklist-trigger" id="target-trigger">
              <span class="placeholder">Select source first...</span>
              <span class="arrow">&#9660;</span>
            </div>
            <div class="picklist-dropdown" id="target-dropdown">
              <input type="text" class="picklist-search" placeholder="Search orgs..." id="target-search">
              <div id="target-options"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Step 2: Select Objects -->
    <div class="card" id="step-objects">
      <div class="step-label">Step 2</div>
      <div class="field-label">Objects to Migrate</div>
      <span class="select-all" id="toggle-all">Select all</span>
      <div class="objects-grid" id="objects-grid"></div>
    </div>

    <!-- Step 3: Review & Run (includes results) -->
    <div class="card" id="step-run">
      <div class="step-label">Step 3</div>
      <div class="field-label">Review &amp; Run</div>
      <div class="review" id="review-box"></div>
      <div class="warning hidden" id="prod-warning">&#9888; Target is a production org — migration blocked.</div>
      <button class="btn" id="run-btn" disabled>Start Migration</button>

      <!-- Live progress status (shown during migration) -->
      <div class="hidden" id="progress-area">
        <div class="progress-status" id="progress-status"></div>
      </div>

      <!-- Results (shown after migration) -->
      <div class="hidden" id="results-area">
        <div id="results-content"></div>
      </div>
    </div>
  </div>

<script>
  let orgs = [];
  let objects = [];
  let selectedObjects = new Set();
  let sourceValue = '';
  let targetValue = '';

  const gridEl = document.getElementById('objects-grid');
  const reviewEl = document.getElementById('review-box');
  const runBtn = document.getElementById('run-btn');
  const prodWarning = document.getElementById('prod-warning');
  const toggleAll = document.getElementById('toggle-all');
  const progressArea = document.getElementById('progress-area');
  const progressStatus = document.getElementById('progress-status');
  const resultsArea = document.getElementById('results-area');
  const resultsContent = document.getElementById('results-content');

  // -- Picklist component --
  function createPicklist(id, { onSelect, filterFn }) {
    const trigger = document.getElementById(`${id}-trigger`);
    const dropdown = document.getElementById(`${id}-dropdown`);
    const search = document.getElementById(`${id}-search`);
    const options = document.getElementById(`${id}-options`);

    function render(filter = '') {
      const items = (filterFn ? filterFn(orgs) : orgs).filter(o => {
        if (!filter) return true;
        const q = filter.toLowerCase();
        return o.alias.toLowerCase().includes(q) || o.username.toLowerCase().includes(q);
      });

      if (items.length === 0) {
        options.innerHTML = '<div class="picklist-empty">No matching orgs</div>';
        return;
      }

      options.innerHTML = items.map(o => {
        const badgeClass = o.is_sandbox ? 'badge-sandbox' : 'badge-prod';
        const badgeText = o.is_sandbox ? 'Sandbox' : 'Production';
        return `<div class="picklist-item" data-alias="${o.alias}">
          <div class="org-info">
            <div class="org-alias">${o.alias}</div>
            <div class="org-username">${o.username}</div>
          </div>
          <span class="org-badge ${badgeClass}">${badgeText}</span>
        </div>`;
      }).join('');

      options.querySelectorAll('.picklist-item').forEach(item => {
        item.addEventListener('click', () => {
          const alias = item.dataset.alias;
          const org = orgs.find(o => o.alias === alias);
          onSelect(org);
          close();
          setTriggerDisplay(trigger, org);
        });
      });
    }

    function open() {
      trigger.classList.add('open');
      dropdown.classList.add('open');
      search.value = '';
      render();
      setTimeout(() => search.focus(), 0);
    }

    function close() {
      trigger.classList.remove('open');
      dropdown.classList.remove('open');
    }

    function toggle() {
      if (dropdown.classList.contains('open')) close();
      else open();
    }

    trigger.addEventListener('click', toggle);
    search.addEventListener('input', () => render(search.value));

    // Close on outside click
    document.addEventListener('click', (e) => {
      if (!trigger.contains(e.target) && !dropdown.contains(e.target)) close();
    });

    return { render, close };
  }

  function setTriggerDisplay(trigger, org) {
    const badgeClass = org.is_sandbox ? 'badge-sandbox' : 'badge-prod';
    const badgeText = org.is_sandbox ? 'SB' : 'PROD';
    trigger.innerHTML = `
      <div class="trigger-selected">
        <span>${org.alias}</span>
        <span class="org-badge ${badgeClass}">${badgeText}</span>
      </div>
      <span class="arrow">&#9660;</span>`;
  }

  // -- Init picklists --
  const sourcePicklist = createPicklist('source', {
    onSelect(org) {
      sourceValue = org.alias;
      targetValue = '';
      // Reset target display
      const tt = document.getElementById('target-trigger');
      tt.innerHTML = '<span class="placeholder">Select target org...</span><span class="arrow">&#9660;</span>';
      targetPicklist.render();
      updateReview();
    }
  });

  const targetPicklist = createPicklist('target', {
    filterFn: (allOrgs) => allOrgs.filter(o => o.alias !== sourceValue),
    onSelect(org) {
      targetValue = org.alias;
      updateReview();
    }
  });

  // -- Objects --
  function renderObjects() {
    gridEl.innerHTML = '';
    objects.forEach((obj, i) => {
      const div = document.createElement('div');
      div.className = 'obj-item';
      div.innerHTML = `<input type="checkbox" id="obj-${i}" value="${obj}"><label for="obj-${i}">${obj}</label>`;
      div.addEventListener('click', (e) => {
        if (e.target.tagName === 'INPUT') return;
        const cb = div.querySelector('input');
        cb.checked = !cb.checked;
        cb.dispatchEvent(new Event('change'));
      });
      div.querySelector('input').addEventListener('change', (e) => {
        if (e.target.checked) { selectedObjects.add(obj); div.classList.add('selected'); }
        else { selectedObjects.delete(obj); div.classList.remove('selected'); }
        updateReview();
      });
      gridEl.appendChild(div);
    });
  }

  toggleAll.addEventListener('click', () => {
    const allSelected = selectedObjects.size === objects.length;
    gridEl.querySelectorAll('input').forEach((cb, i) => {
      cb.checked = !allSelected;
      const obj = objects[i];
      if (!allSelected) { selectedObjects.add(obj); cb.parentElement.classList.add('selected'); }
      else { selectedObjects.delete(obj); cb.parentElement.classList.remove('selected'); }
    });
    toggleAll.textContent = allSelected ? 'Select all' : 'Deselect all';
    updateReview();
  });

  // -- Review --
  function updateReview() {
    const objs = [...selectedObjects];
    const srcOrg = orgs.find(o => o.alias === sourceValue);
    const tgtOrg = orgs.find(o => o.alias === targetValue);

    const srcBadge = srcOrg ? `<span class="org-badge ${srcOrg.is_sandbox ? 'badge-sandbox' : 'badge-prod'}" style="font-size:0.6rem;padding:1px 6px;border-radius:8px">${srcOrg.is_sandbox ? 'SB' : 'PROD'}</span>` : '';
    const tgtBadge = tgtOrg ? `<span class="org-badge ${tgtOrg.is_sandbox ? 'badge-sandbox' : 'badge-prod'}" style="font-size:0.6rem;padding:1px 6px;border-radius:8px">${tgtOrg.is_sandbox ? 'SB' : 'PROD'}</span>` : '';

    let html = '';
    html += `<div><span class="label">Source: </span><span class="value">${sourceValue || '&mdash;'}</span> ${srcBadge}</div>`;
    html += `<div><span class="label">Target: </span><span class="value">${targetValue || '&mdash;'}</span> ${tgtBadge}</div>`;
    html += `<div><span class="label">Objects: </span><span class="value">${objs.length > 0 ? objs.join(', ') : '&mdash;'}</span></div>`;
    reviewEl.innerHTML = html;

    const isProd = tgtOrg && !tgtOrg.is_sandbox;
    prodWarning.classList.toggle('hidden', !isProd);

    const ready = sourceValue && targetValue && objs.length > 0 && !isProd;
    runBtn.disabled = !ready;
  }

  // -- Live progress tracking --
  const progressItems = {};

  function showProgress(name) {
    if (progressItems[name]) return;
    const div = document.createElement('div');
    div.className = 'progress-item';
    div.id = `progress-${name.replace(/\s+/g, '-')}`;
    div.innerHTML = `
      <span class="progress-icon running"><span class="spinner" style="width:14px;height:14px;border-width:2px;margin:0"></span></span>
      <span class="progress-name">${name}</span>
      <span class="progress-detail" id="detail-${name.replace(/\s+/g, '-')}">fetching...</span>`;
    progressStatus.appendChild(div);
    progressItems[name] = div;
  }

  function doneProgress(name, detail) {
    const key = name.replace(/\s+/g, '-');
    const div = progressItems[name];
    if (!div) return;
    div.querySelector('.progress-icon').innerHTML = '&#10003;';
    div.querySelector('.progress-icon').className = 'progress-icon done';
    const detailEl = div.querySelector(`#detail-${key}`);
    if (detailEl) detailEl.textContent = detail;
  }

  // -- Run migration (SSE) --
  runBtn.addEventListener('click', async () => {
    runBtn.disabled = true;
    runBtn.classList.add('running');
    runBtn.innerHTML = '<span class="spinner"></span>Migrating...';
    resultsArea.classList.add('hidden');
    progressArea.classList.remove('hidden');
    progressStatus.innerHTML = '';
    Object.keys(progressItems).forEach(k => delete progressItems[k]);

    try {
      const res = await fetch('/api/migrate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          source: sourceValue,
          target: targetValue,
          objects: [...selectedObjects],
        }),
      });

      const contentType = res.headers.get('content-type') || '';

      if (!res.ok || !contentType.includes('text/event-stream')) {
        // Error response (non-SSE)
        const data = await res.json();
        progressArea.classList.add('hidden');
        resultsArea.classList.remove('hidden');
        resultsContent.innerHTML = `<div class="error-banner">${data.error || 'Unknown error'}</div>`;
      } else {
        // Read SSE stream
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          const lines = buffer.split('\n');
          buffer = lines.pop(); // keep incomplete line

          for (const line of lines) {
            if (!line.startsWith('data:')) continue;
            const jsonStr = line.slice(5).trim();
            if (!jsonStr) continue;
            try {
              const evt = JSON.parse(jsonStr);
              if (evt.event === 'complete') {
                // Final event — show results
                progressArea.classList.add('hidden');
                resultsArea.classList.remove('hidden');
                let html = '<div class="success-banner">Migration Complete</div><div class="results">';
                (evt.results || []).forEach(r => {
                  html += `<div class="result-item">
                    <span class="name">${r.object}</span>
                    <span class="stats">
                      <span>${r.extracted} extracted</span>
                      <span class="skipped">${r.skipped} skipped</span>
                      <span class="inserted">${r.inserted} inserted</span>
                    </span>
                  </div>`;
                });
                html += '</div>';
                resultsContent.innerHTML = html;
              } else if (evt.event === 'start') {
                showProgress(evt.name);
              } else if (evt.event === 'done') {
                const d = evt.detail || {};
                doneProgress(evt.name, `${d.extracted || 0} extracted, ${d.inserted || 0} inserted, ${d.skipped || 0} skipped`);
              }
            } catch (_) { /* ignore parse errors */ }
          }
        }
      }
    } catch (e) {
      progressArea.classList.add('hidden');
      resultsArea.classList.remove('hidden');
      resultsContent.innerHTML = `<div class="error-banner">Network error: ${e.message}</div>`;
    }

    runBtn.classList.remove('running');
    runBtn.textContent = 'Start Migration';
    runBtn.disabled = false;
  });

  // -- Init --
  async function init() {
    const [orgsRes, objsRes] = await Promise.all([
      fetch('/api/orgs').then(r => r.json()),
      fetch('/api/objects').then(r => r.json()),
    ]);
    orgs = orgsRes;
    objects = objsRes;
    renderObjects();
    updateReview();
  }

  init();
</script>
</body>
</html>
